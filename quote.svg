<svg width="495" height="120" viewBox="0 0 495 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .card { animation: fade 0.6s ease both; }
    .q { font-family: monospace; font-size: 12px; fill: #e6edf3; }
    .a { font-family: monospace; font-size: 11px; fill: #8b949e; }
    .mark { font-family: monospace; font-size: 22px; fill: #3fb950; }
  </style>

  <g class="card">
    <rect width="495" height="120" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

    <text class="mark" x="20" y="42">"</text>

    <text class="q" x="38" y="42">Any fool can write code that a computer can understand.</text>
    <text class="q" x="38" y="60">Good programmers write code that humans can understand.</text>

    <text class="mark" x="460" y="78">"</text>

    <text class="a" x="475" y="100" text-anchor="end">— Martin Fowler</text>
  </g>
</svg>
